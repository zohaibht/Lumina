name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Pehle se mojood android folder delete karein taake fresh build banay
          rm -rf android
          
          # Capacitor initialize (Bina --confirm ke)
          npx cap init Lumina com.lumina.app --web-dir dist
          
          # Android platform add karein
          npx cap add android
          
          # Sync karein
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
