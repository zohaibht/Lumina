name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Warning khatam karne ke liye update kiya

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor Android
        run: npm install @capacitor/android @capacitor/core @capacitor/cli

      - name: Initialize and Sync Capacitor
        run: |
          # Agar capacitor.config.json nahi hai to ye banaye ga
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init Lumina com.lumina.app --web-dir dist --confirm
          fi
          # Android platform add aur sync karein
          npx cap add android || true
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
